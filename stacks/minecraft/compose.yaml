services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    restart: unless-stopped
    ports:
      - "25565:25565/tcp"
    environment:
      EULA: "TRUE"
      TZ: "Asia/Kolkata"
      MEMORY: "2G"
      # Pin the server so clients do not break when Mojang latest advances.
      VERSION: "26.2"
      # Fabric keeps vanilla client compatibility while allowing server-side performance mods.
      TYPE: "FABRIC"
      MODS: "https://cdn.modrinth.com/data/gvQqBUqZ/versions/x1OEDMlF/lithium-fabric-0.25.0%2Bmc26.2.jar,https://cdn.modrinth.com/data/uXXizFIs/versions/d5ddUdiB/ferritecore-9.0.0-fabric.jar"
      ENABLE_ROLLING_LOGS: "true"
      # Allow offline/non-Microsoft clients on this private server.
      ONLINE_MODE: "FALSE"
      ENFORCE_SECURE_PROFILE: "FALSE"
      # Leave whitelist disabled until allowed player usernames are available.
      # To restrict later, add ENABLE_WHITELIST: "TRUE" and WHITELIST: "user1,user2".
    volumes:
      - minecraft-data:/data
    stdin_open: true
    tty: true

volumes:
  minecraft-data:
    name: minecraft_data
